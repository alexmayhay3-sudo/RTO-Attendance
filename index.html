<!DOCTYPE html>
<html>
<head>
<title>RTO Attendance Tracker</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f8;
padding:30px;
}

table{
border-collapse:collapse;
background:white;
width:100%;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

th{
background:#0078D4;
color:white;
position:sticky;
top:0;
}

tr:hover{
background:#f1f1f1;
}

select,input{
padding:5px;
margin-right:5px;
}

button{
padding:6px 10px;
cursor:pointer;
}

.removeBtn{
background:#d9534f;
color:white;
border:none;
}

.container{
max-width:100%;
}

.RTO{background:#d4edda}
.WFH{background:#d1ecf1}
.Vacation{background:#fff3cd}
.Sick{background:#e2d6f3}
.Unconfirmed{background:#f8d7da}

</style>
</head>

<body>

<h2>RTO Attendance Tracker</h2>

<label>Checker Name:</label>
<input id="editor">

<label>Month:</label>

<select id="monthSelect" onchange="changeMonth()">
<option value="0">January</option>
<option value="1">February</option>
<option value="2" selected>March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>

<label>Year:</label>
<select id="yearSelect" onchange="changeMonth()"></select>

<h3 id="currentMonth"></h3>

<br>

<h3>Add Employee</h3>

<input id="empName" placeholder="Employee Name">
<input id="teamName" placeholder="Team">

<button onclick="addEmployee()">Add Employee</button>

<br><br>

<button onclick="exportTable()">Export to Excel</button>

<br><br>

<div class="container" style="overflow-x:auto">
<table id="rtoTable"></table>
</div>

<h3>Audit Log</h3>

<div style="max-height:300px;overflow-y:auto;background:white;border:1px solid #ccc;">
<table id="auditTable">

<thead>
<tr>
<th>User</th>
<th>Employee</th>
<th>Date</th>
<th>Status</th>
<th>Time</th>
</tr>
</thead>

<tbody id="auditBody"></tbody>

</table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDT_R4snf2GPeAMj8KwG_gIFkuabMIw2UE",
authDomain: "rto-attendance-tracker.firebaseapp.com",
databaseURL: "https://rto-attendance-tracker-c18e8-default-rtdb.asia-southeast1.firebasedatabase.app/",
projectId: "rto-attendance-tracker",
storageBucket: "rto-attendance-tracker.firebasestorage.app",
messagingSenderId: "618387456280",
appId: "1:618387456280:web:7115e8414115b3555f5e6d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

</script>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwkAXnCSjzv3D7FXlWsaMzANgPANqVRplDPYdNe6p6l5Ykx67rt9EmSeSs5JweubjEbUg/exec"

let employees=[]
let daysInMonth=31
let attendance={}

function populateYears(){

let yearSelect=document.getElementById("yearSelect")
let currentYear=new Date().getFullYear()

for(let y=2024;y<=2050;y++){

let option=document.createElement("option")
option.value=y
option.text=y

if(y===currentYear) option.selected=true

yearSelect.appendChild(option)

}

}

function getDaysInMonth(year,month){
return new Date(year,month+1,0).getDate()
}

function generateHeader(){

let table=document.getElementById("rtoTable")

let header1=document.createElement("tr")
let header2=document.createElement("tr")

header1.innerHTML="<th>Name</th><th>Team</th>"
header2.innerHTML="<th></th><th></th>"

let month=parseInt(document.getElementById("monthSelect").value)
let year=parseInt(document.getElementById("yearSelect").value)

daysInMonth=getDaysInMonth(year,month)

let days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

for(let i=1;i<=daysInMonth;i++){

let date=new Date(year,month,i)

header1.innerHTML+=`<th>${i}</th>`
header2.innerHTML+=`<th>${days[date.getDay()]}</th>`

}

header1.innerHTML+="<th>Remove</th>"
header2.innerHTML+="<th></th>"

table.appendChild(header1)
table.appendChild(header2)

}

function changeMonth(){

let monthSelect=document.getElementById("monthSelect")
let year=document.getElementById("yearSelect").value

let monthName=monthSelect.options[monthSelect.selectedIndex].text

document.getElementById("currentMonth").innerText="Viewing: "+monthName+" "+year

reloadEmployees()

}

function getCellColor(status){

if(status=="RTO") return "RTO"
if(status=="WFH") return "WFH"
if(status=="Vacation Leave") return "Vacation"
if(status=="Sick Leave") return "Sick"
if(status=="Unconfirmed") return "Unconfirmed"

return ""

}

function createDropdown(name,day){

let month=document.getElementById("monthSelect").value
let year=document.getElementById("yearSelect").value

let key=name+"-"+year+"-"+month+"-"+day
let saved=attendance[key] || ""

let options=["","RTO","WFH","Vacation Leave","Sick Leave","Unconfirmed"]

let html=`<select onchange="logStatus(this,'${name}','${day}')">`

options.forEach(o=>{
html+=`<option ${saved===o?"selected":""}>${o}</option>`
})

html+="</select>"

return html

}

function addEmployee(){

let name=document.getElementById("empName").value.trim()
let team=document.getElementById("teamName").value.trim()

if(name==""||team==""){
alert("Enter employee name and team")
return
}

db.ref("employees/"+name).set({
name:name,
team:team
})

document.getElementById("empName").value=""
document.getElementById("teamName").value=""

}

function removeEmployee(name){
db.ref("employees/"+name).remove()
}

function loadEmployees(){

db.ref("employees").on("value",snapshot=>{

employees=[]

snapshot.forEach(child=>{
employees.push(child.val())
})

reloadEmployees()

})

}

function reloadEmployees(){

let table=document.getElementById("rtoTable")

table.innerHTML=""

generateHeader()

let month=document.getElementById("monthSelect").value
let year=document.getElementById("yearSelect").value

employees.forEach(emp=>{

let row=table.insertRow()

row.insertCell(0).innerText=emp.name
row.insertCell(1).innerText=emp.team

for(let i=1;i<=daysInMonth;i++){

let cell=row.insertCell(i+1)

cell.innerHTML=createDropdown(emp.name,i)

let key=emp.name+"-"+year+"-"+month+"-"+i
let saved=attendance[key]

let color=getCellColor(saved)

if(color) cell.classList.add(color)

}

let removeCell=row.insertCell(daysInMonth+2)

removeCell.innerHTML=`<button class="removeBtn" onclick="removeEmployee('${emp.name}')">Remove</button>`

})

}

function logStatus(select,name,day){

let editor=document.getElementById("editor").value

if(editor==""){
alert("Enter checker name")
select.value=""
return
}

let status=select.value

let month=document.getElementById("monthSelect").value
let year=document.getElementById("yearSelect").value

let key=name+"-"+year+"-"+month+"-"+day

attendance[key]=status

db.ref("attendance/"+key).set(status)

}

function loadAttendance(){

db.ref("attendance").once("value",snapshot=>{

attendance=snapshot.val() || {}

reloadEmployees()

})

}

populateYears()
changeMonth()
loadEmployees()
loadAttendance()

</script>

</body>
</html>
