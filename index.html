<!DOCTYPE html>
<html>
<head>
<title>RTO Attendance Tracker</title>

<style>

body{
font-family:Segoe UI;
background:#f4f6f8;
padding:30px;
}

.container{
max-width:100%;
}

/* TABLE */

table{
border-collapse:collapse;
background:white;
width:100%;
font-size:12px;
}

/* headers */

th{
background:#0078D4;
color:white;
position:sticky;
top:0;
padding:6px;
border:1px solid #cfcfcf;
}

/* cells */

td{
border:1px solid #e3e3e3;
padding:3px;
text-align:center;
min-width:42px;
}

/* employee columns fixed */

td:first-child, th:first-child{
position:sticky;
left:0;
background:#ffffff;
z-index:2;
}

td:nth-child(2), th:nth-child(2){
position:sticky;
left:120px;
background:#ffffff;
z-index:2;
}

/* zebra rows */

#rtoTable tr:nth-child(even){
background:#fafafa;
}

#rtoTable tr:nth-child(odd){
background:#ffffff;
}

/* hover highlight */

#rtoTable tr:hover{
background:#e8f2ff;
}

/* dropdown compact */

select{
width:40px;
font-size:10px;
padding:2px;
border:1px solid #ccc;
border-radius:3px;
}

/* inputs */

input{
padding:5px;
margin-right:5px;
}

/* buttons */

button{
padding:6px 10px;
cursor:pointer;
border:none;
border-radius:4px;
background:#0078D4;
color:white;
}

button:hover{
opacity:.85;
}

/* remove button */

.removeBtn{
background:#d9534f;
}

/* status colors */

.RTO{
background:#d4edda !important;
}

.WFH{
background:#d1ecf1 !important;
}

.Vacation{
background:#fff3cd !important;
}

.Sick{
background:#e2d6f3 !important;
}

.Unconfirmed{
background:#f8d7da !important;
}

/* audit log table */

#auditTable{
width:100%;
font-size:12px;
border-collapse:collapse;
}

#auditTable th{
background:#343a40;
color:white;
}

#auditTable td{
border:1px solid #ddd;
padding:5px;
}

</style>
</head>

<body>

<h2>RTO Attendance Tracker</h2>

<label>Checker Name:</label>
<input id="editor">

<label>Month:</label>

<select id="monthSelect" onchange="changeMonth()">
<option value="0">January</option>
<option value="1">February</option>
<option value="2" selected>March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>

<label>Year:</label>
<select id="yearSelect" onchange="changeMonth()"></select>

<h3 id="currentMonth"></h3>

<br>

<h3>Add Employee</h3>

<input id="empName" placeholder="Employee Name">
<input id="teamName" placeholder="Team">

<button onclick="addEmployee()">Add Employee</button>

<br><br>

<button onclick="exportTable()">Export to Excel</button>

<br><br>

<div class="container" style="overflow-x:auto">
<table id="rtoTable"></table>
</div>

<h3>Audit Log</h3>

<div style="max-height:300px;overflow-y:auto;background:white;border:1px solid #ccc;">
<table id="auditTable">

<thead>
<tr>
<th>User</th>
<th>Employee</th>
<th>Date</th>
<th>Status</th>
<th>Time</th>
</tr>
</thead>

<tbody id="auditBody"></tbody>

</table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDW7OSttX3WtwqcUIgSZkCWDLI-HCAgAMA",
authDomain: "rto-attendance-tracker-c18e8.firebaseapp.com",
databaseURL: "https://rto-attendance-tracker-c18e8-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rto-attendance-tracker-c18e8",
storageBucket: "rto-attendance-tracker-c18e8.firebasestorage.app",
messagingSenderId: "517181509229",
appId: "1:517181509229:web:7cfecdc0e4e985f3107964"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

</script>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxOvS_MxvPyjaL66O98RSnEB3Omz3G4a0Mh6WPNu3Zrs3M_NUi3FulIUvFTo0RsMlSAxA/exec"

let employees=[]
let daysInMonth=31
let attendance={}

function populateYears(){

let yearSelect=document.getElementById("yearSelect")
let currentYear=new Date().getFullYear()

for(let y=2024;y<=2050;y++){

let option=document.createElement("option")
option.value=y
option.text=y

if(y===currentYear) option.selected=true

yearSelect.appendChild(option)

}

}

function getDaysInMonth(year,month){
return new Date(year,month+1,0).getDate()
}

function generateHeader(){

let table=document.getElementById("rtoTable")

let header1=document.createElement("tr")
let header2=document.createElement("tr")

header1.innerHTML="<th>Name</th><th>Team</th>"
header2.innerHTML="<th></th><th></th>"

let month=parseInt(document.getElementById("monthSelect").value)
let year=parseInt(document.getElementById("yearSelect").value)

daysInMonth=getDaysInMonth(year,month)

let days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

for(let i=1;i<=daysInMonth;i++){

let date=new Date(year,month,i)

header1.innerHTML+=`<th>${i}</th>`
header2.innerHTML+=`<th>${days[date.getDay()]}</th>`

}

header1.innerHTML+="<th>Remove</th>"
header2.innerHTML+="<th></th>"

table.appendChild(header1)
table.appendChild(header2)

}

function changeMonth(){

let monthSelect=document.getElementById("monthSelect")
let year=document.getElementById("yearSelect").value

let monthName=monthSelect.options[monthSelect.selectedIndex].text

document.getElementById("currentMonth").innerText="Viewing: "+monthName+" "+year

reloadEmployees()

}

function getCellColor(status){

if(status=="RTO") return "RTO"
if(status=="WFH") return "WFH"
if(status=="Vacation Leave") return "Vacation"
if(status=="Sick Leave") return "Sick"
if(status=="Unconfirmed") return "Unconfirmed"

return ""

}

function createDropdown(name,day){

let month=document.getElementById("monthSelect").value
let year=document.getElementById("yearSelect").value

let key=name+"-"+year+"-"+month+"-"+day
let saved=attendance[key] || ""

let options=["","RTO","WFH","Vacation Leave","Sick Leave","Unconfirmed"]

let html=`<select onchange="logStatus(this,'${name}','${day}')">`

options.forEach(o=>{
html+=`<option ${saved===o?"selected":""}>${o}</option>`
})

html+="</select>"

return html

}

function addEmployee(){

let name=document.getElementById("empName").value.trim()
let team=document.getElementById("teamName").value.trim()

if(name==""||team==""){
alert("Enter employee name and team")
return
}

db.ref("employees/"+name).set({
name:name,
team:team
})

document.getElementById("empName").value=""
document.getElementById("teamName").value=""

}

function removeEmployee(name){
db.ref("employees/"+name).remove()
}

function loadEmployees(){

db.ref("employees").on("value",snapshot=>{

employees=[]

snapshot.forEach(child=>{
employees.push(child.val())
})

reloadEmployees()

})

}

function reloadEmployees(){

let table=document.getElementById("rtoTable")

table.innerHTML=""

generateHeader()

let month=document.getElementById("monthSelect").value
let year=document.getElementById("yearSelect").value

employees.forEach(emp=>{

let row=table.insertRow()

row.insertCell(0).innerText=emp.name
row.insertCell(1).innerText=emp.team

for(let i=1;i<=daysInMonth;i++){

let cell=row.insertCell(i+1)

cell.innerHTML=createDropdown(emp.name,i)

let key=emp.name+"-"+year+"-"+month+"-"+i
let saved=attendance[key]

let color=getCellColor(saved)

if(color) cell.classList.add(color)

}

let removeCell=row.insertCell(daysInMonth+2)

removeCell.innerHTML=`<button class="removeBtn" onclick="removeEmployee('${emp.name}')">Remove</button>`

})

}

function logStatus(select,name,day){

let editor=document.getElementById("editor").value

if(editor==""){
alert("Enter checker name")
select.value=""
return
}

let status=select.value

let month=document.getElementById("monthSelect").value
let year=document.getElementById("yearSelect").value

let key=name+"-"+year+"-"+month+"-"+day

attendance[key]=status

db.ref("attendance/"+key).set(status)

let date=(parseInt(month)+1)+"/"+day+"/"+year

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
editor:editor,
employee:name,
date:date,
status:status
})
})

}

function loadAttendance(){

db.ref("attendance").once("value",snapshot=>{

attendance=snapshot.val() || {}

reloadEmployees()

})

}

function loadLogs(){

fetch(SCRIPT_URL)
.then(res=>res.json())
.then(data=>{

let body=document.getElementById("auditBody")
body.innerHTML=""

data.reverse().forEach(row=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${row[0]}</td>
<td>${row[1]}</td>
<td>${row[2]}</td>
<td>${row[3]}</td>
<td>${row[4]}</td>
`

body.appendChild(tr)

})

})

}

/* ===== EXPORT TO EXCEL FUNCTION ===== */

function exportTable(){

let table=document.getElementById("rtoTable")
let rows=table.rows

let html="<table border='1'>"

for(let i=0;i<rows.length;i++){

html+="<tr>"

let cells=rows[i].cells

for(let j=0;j<cells.length;j++){

let cell=cells[j]
let select=cell.querySelector("select")

let value=""

if(select){
value=select.options[select.selectedIndex].text
}else{
value=cell.innerText
}

html+="<td>"+value+"</td>"

}

html+="</tr>"

}

html+="</table>"

let blob=new Blob([html],{
type:"application/vnd.ms-excel"
})

let url=URL.createObjectURL(blob)

let link=document.createElement("a")
link.href=url
link.download="RTO_Attendance.xls"

document.body.appendChild(link)
link.click()
document.body.removeChild(link)

URL.revokeObjectURL(url)

}

/* ===== INIT ===== */

populateYears()
changeMonth()
loadEmployees()
loadAttendance()
loadLogs()

setInterval(loadLogs,5000)

</script>

</body>
</html>
