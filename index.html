<!DOCTYPE html>
<html>
<head>
<title>RTO Attendance Tracker</title>

<style>

body{
font-family:Segoe UI, Arial;
background:#1e1e1e;
color:#e6e6e6;
padding:30px;
}

.container{
max-width:100%;
}

/* TABLE */

table{
border-collapse:collapse;
width:100%;
background:#2a2a2a;
font-size:12px;
}

/* HEADER */

th{
background:#0f4c81;
color:white;
border:1px solid #444;
padding:6px;
position:sticky;
top:0;
z-index:3;
}

/* CELLS */

td{
border:1px solid #3b3b3b;
padding:3px;
text-align:center;
min-width:42px;
transition:background .12s ease;
}

/* ROW COLORS */

#rtoTable tr:nth-child(even){background:#2f2f2f;}
#rtoTable tr:nth-child(odd){background:#262626;}
#rtoTable tr:hover{background:#3a3f46;}

/* STICKY */

td:first-child, th:first-child{
position:sticky;
left:0;
background:#202020;
z-index:2;
}

td:nth-child(2), th:nth-child(2){
position:sticky;
left:120px;
background:#202020;
z-index:2;
}

/* INPUTS */

input{
padding:6px;
margin-right:6px;
border-radius:4px;
border:1px solid #555;
background:#1f1f1f;
color:#e6e6e6;
}

/* BUTTONS */

button{
padding:6px 12px;
cursor:pointer;
border:none;
border-radius:4px;
background:#0f4c81;
color:white;
}

button:hover{
background:#1565a9;
}

/* 🔥 DROPDOWN FIX */

select{
width:42px;
font-size:10px;
padding:2px;
border-radius:3px;
border:1px solid #555;
background:#1f1f1f;
color:#e6e6e6;
appearance:none;
}

select option{
background:#1f1f1f;
color:#e6e6e6;
}

select:focus{
outline:none;
border-color:#0f4c81;
box-shadow:0 0 3px #0f4c81;
}

/* STATUS COLORS */

.RTO{background:#1f6f43 !important;color:white;}
.WFH{background:#176b87 !important;color:white;}
.Vacation{background:#b88a1b !important;color:black;}
.Sick{background:#6b4fb3 !important;color:white;}
.Off{background:#a93232 !important;color:white;}

/* TODAY HIGHLIGHT */

.today{
background:#ff9800 !important;
color:black !important;
}

</style>
</head>

<body>

<h2>RTO Attendance Tracker</h2>

<label>Checker Name:</label>
<input id="editor">

<label>Month:</label>

<select id="monthSelect" onchange="changeMonth()">
<option value="0">January</option>
<option value="1">February</option>
<option value="2">March</option>
<option value="3">April</option>
<option value="4">May</option>
<option value="5">June</option>
<option value="6">July</option>
<option value="7">August</option>
<option value="8">September</option>
<option value="9">October</option>
<option value="10">November</option>
<option value="11">December</option>
</select>

<label>Year:</label>
<select id="yearSelect" onchange="changeMonth()"></select>

<h3 id="currentMonth"></h3>

<div class="container" style="overflow-x:auto">
<table id="rtoTable"></table>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDW7OSttX3WtwqcUIgSZkCWDLI-HCAgAMA",
authDomain: "rto-attendance-tracker-c18e8.firebaseapp.com",
databaseURL: "https://rto-attendance-tracker-c18e8-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "rto-attendance-tracker-c18e8",
storageBucket: "rto-attendance-tracker-c18e8.firebasestorage.app",
messagingSenderId: "517181509229",
appId: "1:517181509229:web:7cfecdc0e4e985f3107964"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let employees=[]
let daysInMonth=31
let attendance={}

/* YEAR */

function populateYears(){
let yearSelect=document.getElementById("yearSelect")
let currentYear=new Date().getFullYear()

for(let y=2024;y<=2050;y++){
let option=document.createElement("option")
option.value=y
option.text=y
if(y===currentYear) option.selected=true
yearSelect.appendChild(option)
}
}

/* AUTO MONTH */

function setCurrentMonth(){
let now=new Date()
document.getElementById("monthSelect").value=now.getMonth()
}

/* HEADER */

function getDaysInMonth(year,month){
return new Date(year,month+1,0).getDate()
}

function generateHeader(){

let table=document.getElementById("rtoTable")

let header1=document.createElement("tr")
let header2=document.createElement("tr")

header1.innerHTML="<th>Name</th><th>Team</th>"
header2.innerHTML="<th></th><th></th>"

let month=parseInt(document.getElementById("monthSelect").value)
let year=parseInt(document.getElementById("yearSelect").value)

daysInMonth=getDaysInMonth(year,month)

let days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]

for(let i=1;i<=daysInMonth;i++){
let date=new Date(year,month,i)
header1.innerHTML+=`<th>${i}</th>`
header2.innerHTML+=`<th>${days[date.getDay()]}</th>`
}

table.appendChild(header1)
table.appendChild(header2)

}

/* TODAY HIGHLIGHT */

function highlightTodayColumn(){

let today=new Date()

let month=parseInt(document.getElementById("monthSelect").value)
let year=parseInt(document.getElementById("yearSelect").value)

if(today.getMonth()!==month || today.getFullYear()!==year){
return
}

let todayDate=today.getDate()
let table=document.getElementById("rtoTable")

let columnIndex=todayDate+1

for(let row of table.rows){
if(row.cells[columnIndex]){
row.cells[columnIndex].classList.add("today")
}
}

}

/* CHANGE MONTH */

function changeMonth(){

let monthSelect=document.getElementById("monthSelect")
let year=document.getElementById("yearSelect").value

let monthName=monthSelect.options[monthSelect.selectedIndex].text

document.getElementById("currentMonth").innerText="Viewing: "+monthName+" "+year

reloadEmployees()

}

/* RELOAD */

function reloadEmployees(){

let table=document.getElementById("rtoTable")

table.innerHTML=""

generateHeader()

employees.forEach(emp=>{

let row=table.insertRow()

row.insertCell(0).innerText=emp.name
row.insertCell(1).innerText=emp.team

for(let i=1;i<=daysInMonth;i++){

let cell=row.insertCell(i+1)
cell.innerHTML="<select><option></option></select>"

}

})

setTimeout(highlightTodayColumn,100)

}

/* INIT */

populateYears()
setCurrentMonth()
changeMonth()

</script>

</body>
</html>
